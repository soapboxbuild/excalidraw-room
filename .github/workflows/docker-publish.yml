name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: soapboxbuild/excalidraw-room

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/soapboxbuild/excalidraw-room:latest
            ghcr.io/soapboxbuild/excalidraw-room:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Railway service source
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          RESULT=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceUpdate(serviceId: \"316f2150-f011-44da-9588-b57240d72636\", environmentId: \"a2baafc5-e755-4749-98c1-1adbb8605245\", input: { source: { image: \"ghcr.io/soapboxbuild/excalidraw-room:latest\" } }) }"
            }')
          echo "Update result: $RESULT"
          echo "$RESULT" | grep -q '"serviceInstanceUpdate":true' || (echo "ERROR: Service update failed" && exit 1)

      - name: Redeploy Railway service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          RESULT=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(serviceId: \"316f2150-f011-44da-9588-b57240d72636\", environmentId: \"a2baafc5-e755-4749-98c1-1adbb8605245\") }"
            }')
          echo "Redeploy result: $RESULT"
          echo "$RESULT" | grep -q '"serviceInstanceRedeploy":true' || (echo "ERROR: Redeploy failed" && exit 1)
          echo "Railway service redeployed successfully"
